<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vòng Quay May Mắn</title>
    <style>
        /* 设置整个页面的基本样式 */
        body {
            margin: 0; /* 移除默认边距 */
            padding: 20px; /* 设置内边距 */
            background-color: #1a0500; /* 设置深红色背景 */
            font-family: "Arial", sans-serif; /* 设置字体 */
            display: flex; /* 使用弹性盒布局 */
            flex-direction: column; /* 垂直排列子元素 */
            align-items: center; /* 水平居中对齐 */
            min-height: 100vh; /* 最小高度为视口高度 */
            color: white; /* 文字颜色为白色 */
            overflow-x: hidden; /* 隐藏水平滚动条 */
        }

        /* 头部样式 */
        .header {
            text-align: center; /* 文字居中 */
            margin-bottom: 20px; /* 底部外边距 */
            width: 100%; /* 宽度100% */
            position: relative; /* 相对定位 */
        }

        /* 标题样式 */
        .title {
            font-size: 32px; /* 字体大小 */
            font-weight: bold; /* 字体粗细 */
            color: #FFD700; /* 金色文字 */
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.7); /* 文字阴影效果 */
            margin: 0 0 10px 0; /* 外边距 */
            letter-spacing: 2px; /* 字母间距 */
            display: flex; /* 弹性盒布局 */
            align-items: center; /* 垂直居中 */
            justify-content: center; /* 水平居中 */
            gap: 15px; /* 元素间距 */
        }

        /* 老虎机样式 */
        .slot-machine {
            width: 40px; /* 宽度 */
            height: 40px; /* 高度 */
            border: 2px solid #FFD700; /* 金色边框 */
            border-radius: 5px; /* 圆角 */
            background: #000; /* 黑色背景 */
            color: #FFD700; /* 金色文字 */
            font-size: 10px; /* 字体大小 */
            display: flex; /* 弹性盒布局 */
            flex-direction: column; /* 垂直排列 */
            align-items: center; /* 水平居中 */
            justify-content: center; /* 垂直居中 */
            padding: 2px; /* 内边距 */
            box-shadow: 0 0 5px #FFD700; /* 金色阴影 */
            font-weight: bold; /* 字体粗细 */
        }

        /* 老虎机数字样式 */
        .slot-nums {
            display: flex; /* 弹性盒布局 */
            gap: 1px; /* 数字间距 */
        }

        /* 主容器样式 */
        .container {
            position: relative; /* 相对定位 */
            width: 100%; /* 宽度100% */
            max-width: 500px; /* 最大宽度 */
            display: flex; /* 弹性盒布局 */
            flex-direction: column; /* 垂直排列 */
            align-items: center; /* 水平居中 */
        }

        /* 转盘包装器样式 */
        .wheel-wrapper {
            position: relative; /* 相对定位 */
            width: 100%; /* 宽度100% */
            aspect-ratio: 1 / 1; /* 宽高比1:1 */
            max-width: 500px; /* 最大宽度 */
            margin-bottom: 20px; /* 底部外边距 */
        }

        /* 转盘画布样式 */
        #wheelCanvas {
            width: 100%; /* 宽度100% */
            height: 100%; /* 高度100% */
            display: block; /* 块级元素 */
            filter: drop-shadow(0 0 20px rgba(255, 165, 0, 0.5)); /* 橙色阴影 */
            transition: transform 4s cubic-bezier(0.25, 0.1, 0.25, 1); /* 旋转过渡效果 */
            transform: rotate(0deg); /* 初始旋转角度 */
        }

        /* 开始按钮容器样式 */
        .spin-button-container {
            position: absolute; /* 绝对定位 */
            top: 50%; /* 垂直居中 */
            left: 50%; /* 水平居中 */
            transform: translate(-50%, -50%); /* 精确居中 */
            z-index: 10; /* 层级 */
            cursor: pointer; /* 鼠标指针 */
            user-select: none; /* 禁止选中文本 */
            transition: transform 0.1s; /* 缩放过渡效果 */
        }

        /* 开始按钮背景样式 */
        .spin-button-bg {
            width: 100px; /* 宽度 */
            height: 100px; /* 高度 */
            background: linear-gradient(180deg, #ff6b6b 0%, #ee5253 100%); /* 渐变背景 */
            border-radius: 50%; /* 圆形 */
            display: flex; /* 弹性盒布局 */
            flex-direction: column; /* 垂直排列 */
            align-items: center; /* 水平居中 */
            justify-content: center; /* 垂直居中 */
            box-shadow: 0 5px 15px rgba(0,0,0,0.5), inset 0 2px 5px rgba(255,255,255,0.3); /* 阴影效果 */
            border: 4px solid #fff; /* 白色边框 */
            color: white; /* 白色文字 */
            font-weight: bold; /* 字体粗细 */
            font-size: 18px; /* 字体大小 */
            text-transform: uppercase; /* 大写字母 */
            letter-spacing: 1px; /* 字母间距 */
            text-align: center; /* 文字居中 */
            line-height: 1.2; /* 行高 */
        }

        /* 指针样式 */
        .pointer {
            position: absolute; /* 绝对定位 */
            top: -25px; /* 向上偏移 */
            left: 50%; /* 水平居中 */
            transform: translateX(-50%); /* 精确水平居中 */
            width: 0; /* 宽度为0（三角形） */
            height: 0; /* 高度为0（三角形） */
            border-left: 20px solid transparent; /* 左边透明 */
            border-right: 20px solid transparent; /* 右边透明 */
            border-bottom: 40px solid #ff4757; /* 底部红色三角形 */
            z-index: 11; /* 层级 */
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); /* 阴影效果 */
        }

        /* 结果显示区域样式 */
        #result {
            margin-top: 20px; /* 顶部外边距 */
            font-size: 24px; /* 字体大小 */
            color: #FFD700; /* 金色文字 */
            text-align: center; /* 文字居中 */
            min-height: 60px; /* 最小高度 */
            font-weight: bold; /* 字体粗细 */
            text-shadow: 0 0 5px rgba(0,0,0,0.5); /* 文字阴影 */
            background: rgba(0,0,0,0.3); /* 半透明黑色背景 */
            padding: 15px 30px; /* 内边距 */
            border-radius: 10px; /* 圆角 */
            border: 2px solid #FFD700; /* 金色边框 */
            width: 80%; /* 宽度80% */
        }

        /* 禁用状态样式 */
        .disabled {
            opacity: 0.6; /* 透明度 */
            pointer-events: none; /* 禁止鼠标事件 */
        }

        /* 响应式设计 */
        @media (max-width: 600px) {
            .title {
                font-size: 24px; /* 较小字体 */
            }
            .spin-button-bg {
                width: 80px; /* 较小宽度 */
                height: 80px; /* 较小高度 */
                font-size: 14px; /* 较小字体 */
            }
            .pointer {
                border-left-width: 15px; /* 较小左边框 */
                border-right-width: 15px; /* 较小右边框 */
                border-bottom-width: 30px; /* 较小底部边框 */
            }
        }
    </style>
</head>
<body>
    <!-- 头部区域 -->
    <div class="header">
        <div class="title">
            <div class="slot-machine">
                <div class="slot-nums">00</div>
                <div class="slot-nums">00</div>
                <div class="slot-nums">00</div>
            </div>
            VÒNG QUAY MAY MẮN
            <div class="slot-machine">
                <div class="slot-nums">00</div>
                <div class="slot-nums">00</div>
                <div class="slot-nums">00</div>
            </div>
        </div>
    </div>

    <!-- 转盘区域 -->
    <div class="container">
        <div class="wheel-wrapper">
            <div class="pointer"></div> <!-- 指针 -->
            <canvas id="wheelCanvas"></canvas> <!-- 转盘画布 -->
            <div class="spin-button-container" onclick="startSpin()" id="spinBtnContainer">
                <div class="spin-button-bg" id="spinBtn">
                    Bắt đầu
                </div>
            </div>
        </div>
        <div id="result">Chúc bạn may mắn!</div> <!-- 结果显示区域 -->
    </div>

    <script>
        // 获取DOM元素
        const canvas = document.getElementById('wheelCanvas'); // 转盘画布
        const ctx = canvas.getContext('2d'); // 2D绘图上下文
        const spinBtnContainer = document.getElementById('spinBtnContainer'); // 开始按钮容器
        const resultDiv = document.getElementById('result'); // 结果显示区域

        // 奖品配置 - 顺时针顺序：100.000, 50.000, 30.000, 10.000, 450.000, 490.000
        const prizes = [
            { name: "Giải ba", sub: "100.000 tiền mặt", color: "#FF6347" },           // 索引0：100.000 - 初始指针位置
            { name: "Giải nhì", sub: "loa Bluetooth HYUNDAI\nTrị giá 490.000 đồng", color: "#FFD700" },           // 索引1：50.000
            { name: "Giải nhất", sub: "máy chiếu HYUNDAI\nTrị giá 4,5 triệu", color: "#FF6347" },           // 索引2：30.000 
            { name: "Giải sáu", sub: "10.000 tiền mặt", color: "#FFD700" },           // 索引3：10.000
            { name: "Giải năm", sub: "30.000 tiền mặt", color: "#FFD700" }, // 索引4：450.000
            { name: "Giải tư", sub: "50.000 tiền mặt", color: "#FFF5EE" } // 索引5：490.000 
        ];
       
       const prizes2 = [
            { name: "Giải ba", sub: "100.000 tiền mặt", color: "#FF6347" },           // 索引0：100.000 - 初始指针位置
            { name: "Giải tư", sub: "50.000 tiền mặt", color: "#FFD700" },           // 索引1：50.000
            { name: "Giải năm", sub: "30.000 tiền mặt", color: "#FF6347" },           // 索引2：30.000 
            { name: "Giải sáu", sub: "10.000 tiền mặt", color: "#FFD700" },           // 索引3：10.000
            { name: "Giải nhất", sub: "máy chiếu HYUNDAI\nTrị giá 4,5 triệu", color: "#FFD700" }, // 索引4：450.000   
            { name: "Giải nhì", sub: "loa Bluetooth HYUNDAI\nTrị giá 490.000 đồng", color: "#FFF5EE" } // 索引5：490.000  

       
                   ];
     

      

        // 权重配置：10.000(60%)、30.000(30%)、50.000(10%)
        // 对应索引：3(六等奖)=60, 2(五等奖)=30, 1(四等奖)=10
        const weights = [0, 10, 30, 60, 0, 0]; // 权重数组
        
        let isSpinning = false; // 是否正在旋转的标志
        let currentRotation = 0; // 当前旋转角度
        let hasSpun = false; // 是否已经旋转过的标志

        // 调整画布大小函数
        function resizeCanvas() {
            const size = canvas.parentElement.offsetWidth; // 获取父元素宽度
            canvas.width = size; // 设置画布宽度
            canvas.height = size; // 设置画布高度
            drawWheel(); // 重新绘制转盘
        }

        // 绘制灯光效果函数
        function drawLights() {
            const centerX = canvas.width / 2; // 画布中心X坐标
            const centerY = canvas.height / 2; // 画布中心Y坐标
            const outerRadius = Math.min(centerX, centerY) - 10; // 外圈半径
            
            ctx.save(); // 保存当前绘图状态
            for (let i = 0; i < 32; i++) { // 循环32次绘制32个灯泡
                const angle = (i / 32) * Math.PI * 2; // 计算每个灯泡的角度
                const x = centerX + Math.cos(angle) * outerRadius; // 灯泡X坐标
                const y = centerY + Math.sin(angle) * outerRadius; // 灯泡Y坐标
                
                // 创建径向渐变
                const gradient = ctx.createRadialGradient(x, y, 0, x, y, 10);
                if (i % 2 === 0) { // 偶数灯泡为黄色
                    gradient.addColorStop(0, "#FFFF00"); // 渐变起始颜色
                    gradient.addColorStop(1, "#FFD700"); // 渐变结束颜色
                } else { // 奇数灯泡为白色
                    gradient.addColorStop(0, "#FFFFFF"); // 渐变起始颜色
                    gradient.addColorStop(1, "#FFFFE0"); // 渐变结束颜色
                }
                
                ctx.beginPath(); // 开始新路径
                ctx.arc(x, y, 8, 0, Math.PI * 2); // 绘制圆形灯泡
                ctx.fillStyle = gradient; // 设置填充样式
                ctx.fill(); // 填充圆形
                ctx.strokeStyle = "#FFA500"; // 描边颜色
                ctx.lineWidth = 1; // 描边宽度
                ctx.stroke(); // 描边
            }
            ctx.restore(); // 恢复之前保存的绘图状态
        }

        // 绘制转盘函数
        function drawWheel() {
            const width = canvas.width; // 画布宽度
            const height = canvas.height; // 画布高度
            const centerX = width / 2; // 中心X坐标
            const centerY = height / 2; // 中心Y坐标
            const radius = Math.min(centerX, centerY) - 50; // 转盘半径
            
            ctx.clearRect(0, 0, width, height); // 清空画布
            drawLights(); // 绘制灯光效果

            const anglePerPrize = (Math.PI * 2) / prizes.length; // 每个奖品占据的角度
            
            ctx.save(); // 保存当前绘图状态
            ctx.translate(centerX, centerY); // 将坐标原点移动到画布中心

            for (let i = 0; i < prizes.length; i++) { // 遍历所有奖品
                const startAngle = i * anglePerPrize; // 扇区起始角度
                const endAngle = startAngle + anglePerPrize; // 扇区结束角度
                
                ctx.beginPath(); // 开始新路径
                ctx.moveTo(0, 0); // 移动到中心点
                ctx.arc(0, 0, radius, startAngle, endAngle); // 绘制扇形
                ctx.closePath(); // 闭合路径
                
                ctx.fillStyle = prizes[i].color; // 设置扇区填充颜色
                ctx.fill(); // 填充扇区
                ctx.strokeStyle = "#fff"; // 设置描边颜色
                ctx.lineWidth = 2; // 描边宽度
                ctx.stroke(); // 描边

                ctx.save(); // 保存当前绘图状态
                ctx.rotate(startAngle + anglePerPrize / 2); // 旋转到扇区中间位置
                
                const textRadius = radius * 0.78; // 文字绘制半径
                ctx.translate(textRadius, 0); // 移动到文字绘制位置
                ctx.rotate(Math.PI / 2); // 旋转90度使文字竖直

                ctx.textAlign = "center"; // 文字水平居中
                ctx.textBaseline = "middle"; // 文字垂直居中

                // 根据背景色设置文字颜色
                if (prizes[i].color === "#FFD700") {
                    ctx.fillStyle = "#d32f2f"; // 黄底红字
                } else if (prizes[i].color === "#FFF5EE") {
                    ctx.fillStyle = "#333"; // 浅色底黑字
                } else {
                    ctx.fillStyle = "#fff"; // 红底白字
                }
                
                ctx.font = "bold 16px Arial"; // 设置字体
                ctx.fillText(prizes[i].name, 0, -15); // 绘制奖品名称

                ctx.font = "11px Arial"; // 设置副标题字体
                if (prizes[i].color === "#FFD700") {
                    ctx.fillStyle = "#b71c1c"; // 黄底深红字
                } else if (prizes[i].color === "#FFF5EE") {
                    ctx.fillStyle = "#555"; // 浅色底深灰字
                } else {
                    ctx.fillStyle = "#fff"; // 红底白字
                }
                
                const subLines = prizes[i].sub.split('\n'); // 分割副标题为多行
                subLines.forEach((line, index) => { // 遍历每一行
                    ctx.fillText(line.trim(), 0, 5 + index * 14); // 绘制副标题
                });

                ctx.restore(); // 恢复之前保存的绘图状态
            }
            
            ctx.restore(); // 恢复之前保存的绘图状态

            const holeRadius = radius * 0.35; // 中心孔半径
            ctx.beginPath(); // 开始新路径
            ctx.arc(centerX, centerY, holeRadius, 0, Math.PI * 2); // 绘制中心圆孔
            ctx.fillStyle = "#fff"; // 设置填充颜色
            ctx.fill(); // 填充圆孔
            ctx.strokeStyle = "#ddd"; // 设置描边颜色
            ctx.lineWidth = 4; // 描边宽度
            ctx.stroke(); // 描边
        }

        // 开始旋转函数
        function startSpin() {
            // 如果已经旋转过或者正在旋转中，则直接返回
            if (hasSpun || isSpinning) return;
            
            isSpinning = true; // 设置旋转标志为true
            hasSpun = true; // 标记为已经旋转过
            resultDiv.innerText = "Đang quay..."; // 显示旋转中
            spinBtnContainer.classList.add('disabled'); // 禁用开始按钮

            const rand = Math.random() * 100; // 生成0-100的随机数
            let selectedIndex = 0; // 选中的奖品索引
            let sum = 0; // 权重累加和

            // 根据权重随机选择奖品
            for (let i = 0; i < weights.length; i++) {
                sum += weights[i]; // 累加权重
                if (rand <= sum) { // 如果随机数小于等于累加和
                    selectedIndex = i; // 选中当前索引
                    break; // 跳出循环
                }
            }

            const anglePerPrize = 360 / prizes.length; // 每个奖品占据的角度
            
            // 计算目标扇区中心角度
            // 初始状态：指针指向100.000（索引0）
            // 顺时针顺序：索引0(100k) -> 索引1(50k) -> 索引2(30k) -> 索引3(10k) -> 索引4(450k) -> 索引5(490k)
            // 指针在12点方向，对应角度270度
            // 目标扇区中心角度 = 270 - (selectedIndex * anglePerPrize + anglePerPrize / 2)
            const targetSectorCenter = 270 - (selectedIndex * anglePerPrize + anglePerPrize / 2);
            
            // 标准化角度到0-360
            let rotateAngle = targetSectorCenter % 360;
            if (rotateAngle < 0) rotateAngle += 360; // 如果为负则加360

            // 固定旋转10圈（3600度）
            const extraRotations = 3600; // 额外旋转圈数
            const finalRotation = currentRotation + extraRotations + rotateAngle; // 最终旋转角度

            currentRotation = finalRotation % 360; // 更新当前旋转角度
            canvas.style.transform = `rotate(${-finalRotation}deg)`; // 应用旋转

            // 4.2秒后显示结果
            setTimeout(() => {
                const winner = prizes2[selectedIndex]; // 获取中奖奖品
                // 显示中奖信息
                resultDiv.innerHTML = `🎉 CHÚC MỪNG! <strong>${winner.name}</strong>: ${winner.sub.replace(/\n/g, ' - ')}`;
                isSpinning = false; // 重置旋转标志
                // 注意：这里不再移除disabled类，按钮将保持禁用状态
            }, 4200);
        }

        // 页面加载完成后初始化
        window.addEventListener('load', () => {
            resizeCanvas(); // 调整画布大小
            // 初始状态：指针指向100.000（索引0）
            // 扇区0中心角度 = 270 - (0 * 60 + 30) = 240度
            currentRotation = 240; // 设置初始旋转角度
            canvas.style.transform = `rotate(${-currentRotation}deg)`; // 应用初始旋转
        });
        
        // 窗口大小改变时重新调整画布
        window.addEventListener('resize', resizeCanvas);
    </script>
</body>
</html>
