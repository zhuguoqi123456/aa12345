<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>幸运大转盘</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(145deg, #1a0a00, #2d1300, #1a0a00);
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            padding: 16px;
            overflow: hidden;
        }
        .container {
            text-align: center;
            max-width: 560px;
            width: 100%;
        }
        .title {
            color: #ffd700;
            font-size: clamp(28px, 6vw, 44px);
            font-weight: 900;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            margin-bottom: 18px;
        }
        .wheel-wrapper {
            position: relative;
            width: min(85vw, 450px);
            height: min(85vw, 450px);
            margin: 0 auto 24px auto;
            aspect-ratio: 1/1;
        }
        /* 外圈装饰 */
        .wheel-border {
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #ffd700, #ff8c00, #ffd700, #ff8c00, #ffd700, #ff8c00, #ffd700, #ff8c00, #ffd700, #ff8c00, #ffd700, #ff8c00);
            padding: 6px;
            box-shadow: 0 0 40px rgba(255, 165, 0, 0.35), inset 0 0 20px rgba(0,0,0,0.4), 0 12px 48px rgba(0,0,0,0.7);
            animation: borderSpin 12s linear infinite;
        }
        @keyframes borderSpin {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }
        .wheel-border-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #1a0800;
            overflow: hidden;
            position: relative;
        }
        /* 灯泡 */
        .bulbs {
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 2;
        }
        .bulb {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #fff9e0, #ffcc00);
            box-shadow: 0 0 8px 2px rgba(255,220,50,0.7);
            animation: bulbFlash 0.8s ease-in-out infinite alternate;
        }
        .bulb:nth-child(odd) {
            animation-delay: 0.4s;
            background: radial-gradient(circle at 35% 35%, #ffe0b0, #ff8800);
            box-shadow: 0 0 8px 2px rgba(255,136,0,0.6);
        }
        @keyframes bulbFlash {
            0% { opacity: 0.5; transform: scale(0.85); }
            100% { opacity: 1; transform: scale(1.1); }
        }
        #wheelCanvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: block;
            cursor: pointer;
            touch-action: none;
        }
        /* 指针 */
        .pointer-container {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 22%;
            height: 52%;
            transform-origin: bottom center;
            transform: translate(-50%, -100%) rotate(0deg);
            z-index: 5;
            pointer-events: none;
            transition: none;
        }
        .pointer-container svg {
            width: 100%;
            height: 100%;
            display: block;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.6));
        }
        .center-cap {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 14%;
            height: 14%;
            border-radius: 50%;
            background: radial-gradient(circle at 38% 38%, #ffdd77, #c8860a);
            box-shadow: 0 0 20px rgba(255,200,50,0.5), inset 0 -4px 8px rgba(0,0,0,0.3), inset 0 4px 8px rgba(255,255,200,0.4);
            z-index: 6;
            border: 3px solid #b87a00;
            pointer-events: none;
        }
        .center-cap::after {
            content: '★';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(16px, 3vw, 32px);
            color: #fff6d0;
            text-shadow: 0 0 12px rgba(255,215,0,0.8);
            line-height: 1;
        }
        .btn-spin {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 56px;
            font-size: clamp(20px, 4vw, 28px);
            font-weight: 800;
            color: #2d1300;
            background: linear-gradient(145deg, #ffd700, #f0a500);
            border: none;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 8px 28px rgba(255,170,0,0.4), 0 2px 8px rgba(0,0,0,0.3), inset 0 2px 0 rgba(255,255,240,0.5);
            transition: all 0.25s ease;
            letter-spacing: 2px;
            user-select: none;
            touch-action: manipulation;
        }
        .btn-spin:hover:not(:disabled) {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 36px rgba(255,170,0,0.55);
        }
        .btn-spin:active:not(:disabled) {
            transform: translateY(0px) scale(0.97);
            box-shadow: 0 4px 16px rgba(255,170,0,0.3);
        }
        .btn-spin:disabled {
            opacity: 0.65;
            cursor: not-allowed;
            transform: scale(0.98);
        }
        .result-box {
            margin-top: 18px;
            min-height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .result-text {
            font-size: clamp(26px, 5vw, 42px);
            font-weight: 900;
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255,215,0,0.4), 0 4px 16px rgba(0,0,0,0.5);
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            letter-spacing: 2px;
        }
        .result-text.show {
            opacity: 1;
            transform: scale(1);
        }
        .result-text .prize-name {
            color: #fff;
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            padding: 0 18px;
            border-radius: 12px;
            display: inline-block;
            margin: 0 6px;
            text-shadow: 0 2px 12px rgba(255,50,50,0.5);
            box-shadow: 0 4px 16px rgba(255,50,50,0.3);
        }
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
            overflow: hidden;
        }
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            top: -20px;
            opacity: 0;
            animation: confettiFall linear forwards;
        }
        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
            70% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg) scale(0.3); opacity: 0; }
        }
        @media (max-width: 420px) {
            .wheel-wrapper { width: 88vw; height: 88vw; }
            .bulb { width: 10px; height: 10px; }
            .btn-spin { padding: 14px 36px; font-size: 18px; }
        }
        .hint {
            color: rgba(255,210,120,0.5);
            font-size: 14px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="title">🎰 幸运大转盘</div>
    <div class="wheel-wrapper" id="wheelWrapper">
        <div class="wheel-border">
            <div class="wheel-border-inner">
                <div class="bulbs" id="bulbsContainer"></div>
                <canvas id="wheelCanvas" width="600" height="600"></canvas>
            </div>
        </div>
        <!-- 指针 SVG -->
        <div class="pointer-container" id="pointerContainer">
            <svg viewBox="0 0 100 260" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="ptrGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#ffd700"/>
                        <stop offset="50%" stop-color="#f0a500"/>
                        <stop offset="100%" stop-color="#b87a00"/>
                    </linearGradient>
                    <filter id="ptrShadow">
                        <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.5"/>
                    </filter>
                </defs>
                <path d="M50,10 L20,190 Q20,210 50,210 Q80,210 80,190 L50,10Z"
                      fill="url(#ptrGrad)" stroke="#8a5e00" stroke-width="2" filter="url(#ptrShadow)"/>
                <path d="M46,30 L44,185 Q47,195 53,195 Q56,195 56,185 L54,30Z"
                      fill="rgba(255,255,220,0.25)"/>
                <circle cx="49.5" cy="17" r="6" fill="#fff6d0" stroke="#b87a00" stroke-width="1.5"
                        filter="url(#ptrShadow)"/>
            </svg>
        </div>
        <div class="center-cap"></div>
    </div>
    <button class="btn-spin" id="spinBtn"><span class="icon">🎲</span> 抽 奖</button>
    <div class="result-box">
        <div class="result-text" id="resultText">🎉 恭喜获得 <span class="prize-name">🏆</span> 🎉</div>
    </div>
    <div class="hint">✨ 每次抽奖都会获得 100.00 元 ✨</div>
</div>
<div class="confetti-container" id="confettiContainer"></div>

<script>
    // ===== 奖项配置 =====
    const PRIZES = ['100.00', '500.00', '谢谢参与', '蓝牙音箱', '1000.00'];
    const COLORS = [
        '#FF4757', // 100.00
        '#FFA502', // 500.00
        '#2ED573', // 谢谢参与
        '#1E90FF', // 蓝牙音箱
        '#A855F7'  // 1000.00
    ];
    // 索引0对应第一个奖项（100.00），始终停在它上面
    const WIN_INDEX = 0;

    // ===== 初始化画布 =====
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const pointerEl = document.getElementById('pointerContainer');
    const spinBtn = document.getElementById('spinBtn');
    const resultText = document.getElementById('resultText');

    const W = canvas.width;   // 600
    const H = canvas.height;
    const CX = W / 2;
    const CY = H / 2;
    const RADIUS = W / 2 - 12;

    const SEG_COUNT = PRIZES.length;
    const ANGLE_PER_SEG = (Math.PI * 2) / SEG_COUNT;

    let isSpinning = false;
    let currentAngle = 0; // 指针当前角度（度）

    // ===== 生成灯泡 =====
    function createBulbs() {
        const container = document.getElementById('bulbsContainer');
        const numBulbs = 24;
        const wrapper = document.querySelector('.wheel-border');
        const size = wrapper ? wrapper.offsetWidth : 440;
        const radius = size / 2 - 6;
        const cx = size / 2;
        const cy = size / 2;
        for (let i = 0; i < numBulbs; i++) {
            const angle = (i / numBulbs) * Math.PI * 2 - Math.PI / 2;
            const x = cx + radius * Math.cos(angle) - 6;
            const y = cy + radius * Math.sin(angle) - 6;
            const bulb = document.createElement('div');
            bulb.className = 'bulb';
            bulb.style.left = x + 'px';
            bulb.style.top = y + 'px';
            bulb.style.animationDelay = (i * 0.07) + 's';
            container.appendChild(bulb);
        }
    }
    createBulbs();

    // ===== 绘制转盘 =====
    function drawWheel() {
        ctx.clearRect(0, 0, W, H);
        for (let i = 0; i < SEG_COUNT; i++) {
            const startAngle = i * ANGLE_PER_SEG - Math.PI / 2;
            const endAngle = startAngle + ANGLE_PER_SEG;

            ctx.beginPath();
            ctx.moveTo(CX, CY);
            ctx.arc(CX, CY, RADIUS, startAngle, endAngle);
            ctx.closePath();

            const grad = ctx.createRadialGradient(CX, CY, 20, CX, CY, RADIUS);
            const baseColor = COLORS[i];
            grad.addColorStop(0, lightenColor(baseColor, 40));
            grad.addColorStop(1, baseColor);
            ctx.fillStyle = grad;
            ctx.fill();

            ctx.strokeStyle = 'rgba(255,255,240,0.15)';
            ctx.lineWidth = 2;
            ctx.stroke();

            // 文字
            const midAngle = startAngle + ANGLE_PER_SEG / 2;
            const textRadius = RADIUS * 0.58;
            const tx = CX + textRadius * Math.cos(midAngle);
            const ty = CY + textRadius * Math.sin(midAngle);

            ctx.save();
            ctx.translate(tx, ty);
            ctx.rotate(midAngle + Math.PI / 2);
            ctx.font = 'bold ' + Math.round(RADIUS * 0.19) + 'px "PingFang SC","Microsoft YaHei",sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 8;
            ctx.fillStyle = '#FFFFFF';
            ctx.fillText(PRIZES[i], 0, 0);
            ctx.restore();
        }
        // 内圈描边
        ctx.beginPath();
        ctx.arc(CX, CY, RADIUS - 2, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255,215,0,0.25)';
        ctx.lineWidth = 3;
        ctx.stroke();
    }

    function lightenColor(hex, pct) {
        let r = parseInt(hex.slice(1, 3), 16);
        let g = parseInt(hex.slice(3, 5), 16);
        let b = parseInt(hex.slice(5, 7), 16);
        r = Math.min(255, r + pct);
        g = Math.min(255, g + pct);
        b = Math.min(255, b + pct);
        return `rgb(${r},${g},${b})`;
    }

    // ===== 指针控制 =====
    function setPointerAngle(deg) {
        pointerEl.style.transform = `translate(-50%,-100%) rotate(${deg}deg)`;
        currentAngle = deg;
    }

    // 计算获奖扇区的中心角度（使得指针垂直向上指向该扇区）
    function getWinAngle() {
        const segAngle = 360 / SEG_COUNT;
        // 第一个扇区（索引0）从 -90° 开始，中心在 -90° + segAngle/2
        return -(WIN_INDEX * segAngle + segAngle / 2);
    }

    // 初始指向100.00
    setPointerAngle(getWinAngle());

    // ===== 抽奖动画 =====
    function spin() {
        if (isSpinning) return;
        isSpinning = true;
        spinBtn.disabled = true;
        resultText.classList.remove('show');

        const targetDeg = getWinAngle();
        const extraTurns = 5 + Math.floor(Math.random() * 3); // 5~7圈
        // 计算需要旋转的总角度（保证最终停在目标角度）
        const currentDeg = currentAngle % 360;
        let delta = (targetDeg - currentDeg + 360) % 360;
        const totalRotation = extraTurns * 360 + delta;

        const duration = 3500 + Math.random() * 1000;
        const startTime = performance.now();
        const startAngle = currentAngle;

        function animate(time) {
            const elapsed = time - startTime;
            const progress = Math.min(elapsed / duration, 1);
            // easeOutCubic
            const eased = 1 - Math.pow(1 - progress, 3);
            const curDeg = startAngle + totalRotation * eased;
            setPointerAngle(curDeg);
            if (progress < 1) {
                requestAnimationFrame(animate);
            } else {
                // 精确归位
                setPointerAngle(targetDeg);
                isSpinning = false;
                spinBtn.disabled = false;
                showResult();
                launchConfetti();
            }
        }
        requestAnimationFrame(animate);
    }

    function showResult() {
        const prizeName = PRIZES[WIN_INDEX];
        resultText.innerHTML = `🎉 恭喜获得 <span class="prize-name">${prizeName}</span> 🎉`;
        setTimeout(() => resultText.classList.add('show'), 50);
    }

    // ===== 彩花效果 =====
    function launchConfetti() {
        const container = document.getElementById('confettiContainer');
        const colors = ['#ffd700', '#ff416c', '#2ed573', '#1e90ff', '#ffa502'];
        for (let i = 0; i < 80; i++) {
            const el = document.createElement('div');
            el.className = 'confetti';
            el.style.left = Math.random() * 100 + '%';
            el.style.background = colors[Math.floor(Math.random() * colors.length)];
            el.style.width = (6 + Math.random() * 8) + 'px';
            el.style.height = (6 + Math.random() * 8) + 'px';
            el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
            el.style.animationDuration = (2 + Math.random() * 2) + 's';
            el.style.animationDelay = Math.random() * 0.8 + 's';
            container.appendChild(el);
            setTimeout(() => el.remove(), 4000);
        }
    }

    // ===== 事件绑定 =====
    spinBtn.addEventListener('click', spin);
    drawWheel();
</script>
</body>
</html>
